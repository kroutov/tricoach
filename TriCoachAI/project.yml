name: TriCoachAI
options:
  bundleIdPrefix: com.tricoach
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: fr

settings:
  base:
    SWIFT_VERSION: 5.0
    CODE_SIGN_STYLE: Automatic
    # Free "Personal Team" — resolved once via Xcode's Signing & Capabilities
    # UI (automatic signing can't discover a team headlessly). See
    # TriCoachAI/README.md for how to redo this if the team ever changes.
    DEVELOPMENT_TEAM: BZHM25XB9A
    ENABLE_PREVIEWS: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Real code signing (now that a team is set) requires every target to
    # have an Info.plist; test targets don't declare one explicitly.
    GENERATE_INFOPLIST_FILE: YES

targets:
  TriCoachAI:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Core
      - path: Features
      - path: Models
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tricoach.ai
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: TriCoach AI
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSHealthShareUsageDescription: "TriCoach AI lit vos données Santé (séances, fréquence cardiaque, sommeil, VO2 max, HRV) pour construire et adapter votre plan d'entraînement."
        NSHealthUpdateUsageDescription: "TriCoach AI peut enregistrer dans Santé les séances que vous complétez depuis l'app."
        NSCalendarsUsageDescription: "TriCoach AI ajoute vos séances planifiées à votre calendrier iOS."
        NSCalendarsFullAccessUsageDescription: "TriCoach AI ajoute vos séances planifiées à votre calendrier iOS."
        CFBundleURLTypes:
          - CFBundleURLName: com.tricoach.ai.oauth
            CFBundleURLSchemes:
              - tricoach
    entitlements:
      path: Generated/TriCoachAI.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.applesignin:
          - Default

  TriCoachAITests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/TriCoachAITests
    dependencies:
      - target: TriCoachAI

  TriCoachAIIntegrationTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/TriCoachAIIntegrationTests
    dependencies:
      - target: TriCoachAI

  TriCoachAIUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/TriCoachAIUITests
    dependencies:
      - target: TriCoachAI

schemes:
  TriCoachAI:
    build:
      targets:
        TriCoachAI: all
        TriCoachAITests: [test]
        TriCoachAIIntegrationTests: [test]
        TriCoachAIUITests: [test]
    test:
      targets:
        - TriCoachAITests
        - TriCoachAIIntegrationTests
        - TriCoachAIUITests
    run:
      config: Debug
