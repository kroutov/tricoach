name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tricoach-backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tricoach
          POSTGRES_PASSWORD: tricoach
          POSTGRES_DB: tricoach_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://tricoach:tricoach@localhost:5432/tricoach_test?schema=public
      TEST_DATABASE_URL: postgresql://tricoach:tricoach@localhost:5432/tricoach_test?schema=public
      JWT_SECRET: ci-test-secret-not-for-real-use
      APPLE_BUNDLE_ID: com.tricoach.ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tricoach-backend/package-lock.json
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run build
      - run: npm test
      - run: npm audit --audit-level=high

  ios:
    runs-on: macos-15
    defaults:
      run:
        shell: bash
    env:
      DATABASE_URL: postgresql://localhost:5432/tricoach
      TEST_DATABASE_URL: postgresql://localhost:5432/tricoach
      JWT_SECRET: ci-test-secret-not-for-real-use
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tricoach-backend/package-lock.json

      - name: Install XcodeGen
        run: brew install xcodegen

      # UI/integration tests exercise a real running backend, same as local
      # dev (see TriCoachAI/README.md) — no Docker service containers on
      # macOS runners, so Postgres + the API server are started by hand here.
      - name: Start local PostgreSQL
        run: |
          brew install postgresql@16
          brew services start postgresql@16
          echo "$(brew --prefix postgresql@16)/bin" >> "$GITHUB_PATH"
          for i in $(seq 1 20); do pg_isready -h localhost -p 5432 && break; sleep 1; done
          createdb tricoach

      - name: Install backend deps and run migrations
        working-directory: tricoach-backend
        run: |
          npm ci
          npx prisma migrate deploy

      - name: Start backend
        working-directory: tricoach-backend
        run: |
          nohup npm run dev > backend.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:3000/health && break; sleep 1; done

      - name: Generate Xcode project
        working-directory: TriCoachAI
        run: xcodegen generate

      # Adjust the simulator name if this stops matching what the pinned
      # Xcode version ships — GitHub's macOS images update periodically.
      - name: Run iOS test suite
        working-directory: TriCoachAI
        run: |
          xcodebuild test \
            -project TriCoachAI.xcodeproj \
            -scheme TriCoachAI \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -resultBundlePath TestResults

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: |
            TriCoachAI/TestResults.xcresult
            tricoach-backend/backend.log
