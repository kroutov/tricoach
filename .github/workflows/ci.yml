name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tricoach-backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tricoach
          POSTGRES_PASSWORD: tricoach
          POSTGRES_DB: tricoach_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://tricoach:tricoach@localhost:5432/tricoach_test?schema=public
      TEST_DATABASE_URL: postgresql://tricoach:tricoach@localhost:5432/tricoach_test?schema=public
      JWT_SECRET: ci-test-secret-not-for-real-use
      APPLE_BUNDLE_ID: com.tricoach.ai
      STRAVA_CLIENT_ID: ci-test-strava-client-id
      STRAVA_CLIENT_SECRET: ci-test-strava-client-secret
      STRAVA_WEBHOOK_VERIFY_TOKEN: ci-test-strava-verify-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tricoach-backend/package-lock.json
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run build
      - run: npm test
      - run: npm audit --audit-level=high

  ios:
    runs-on: macos-15
    defaults:
      run:
        shell: bash
    env:
      DATABASE_URL: postgresql://postgres@localhost:5432/tricoach
      TEST_DATABASE_URL: postgresql://postgres@localhost:5432/tricoach
      JWT_SECRET: ci-test-secret-not-for-real-use
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4
      # Pinned rather than "latest-stable": the newest Xcode on a given
      # runner image often ships without pre-provisioned simulator devices
      # (xcodebuild only lists placeholders for it), while the image's
      # *default* Xcode version reliably has the standard iPhone simulators
      # already created. Bump this deliberately (and re-check available
      # devices) rather than tracking "latest".
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tricoach-backend/package-lock.json

      - name: Install XcodeGen
        run: brew install xcodegen

      # UI/integration tests exercise a real running backend, same as local
      # dev (see TriCoachAI/README.md) — no Docker service containers on
      # macOS runners, so Postgres + the API server are started by hand here.
      - name: Start local PostgreSQL
        run: |
          brew install postgresql@16
          brew services start postgresql@16
          echo "$(brew --prefix postgresql@16)/bin" >> "$GITHUB_PATH"
          for i in $(seq 1 20); do pg_isready -h localhost -p 5432 && break; sleep 1; done
          # Explicit role rather than relying on peer/OS-user auth — Prisma's
          # connection string parser doesn't fall back to the OS user the way
          # psql does, so a URL with no user (as this used to be) sends an
          # empty username and Postgres rejects it outright.
          createuser -s postgres
          createdb -O postgres tricoach

      - name: Install backend deps and run migrations
        working-directory: tricoach-backend
        run: |
          npm ci
          npx prisma migrate deploy

      - name: Start backend
        working-directory: tricoach-backend
        run: |
          nohup npm run dev > backend.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:3000/health && break; sleep 1; done

      - name: Generate Xcode project
        working-directory: TriCoachAI
        run: xcodegen generate

      # A hardcoded destination name (even a pinned Xcode version) has broken
      # this job twice before: some runner instances ship an Xcode with zero
      # pre-created simulator devices at all — xcodebuild then lists only
      # placeholder destinations, regardless of what name is requested.
      # Create our own simulator from whatever runtime + device type this
      # Xcode install actually ships (always present, unlike pre-instantiated
      # devices) instead of hoping one already exists under a specific name.
      - name: Select or create an iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data["devices"].items():
              if "iOS" not in runtime:
                  continue
              for d in devices:
                  if "iPhone" in d["name"]:
                      print(d["udid"])
                      sys.exit(0)
          ')

          if [ -z "$UDID" ]; then
            echo "No existing iPhone simulator found — creating one."
            RUNTIME_ID=$(xcrun simctl list runtimes available -j | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          runtimes = [r["identifier"] for r in data["runtimes"] if r["platform"] == "iOS"]
          print(runtimes[-1])
          ')
            DEVICE_TYPE_ID=$(xcrun simctl list devicetypes -j | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          types = [d["identifier"] for d in data["devicetypes"] if "iPhone" in d["name"]]
          print(types[-1])
          ')
            UDID=$(xcrun simctl create "CI-iPhone" "$DEVICE_TYPE_ID" "$RUNTIME_ID")
          fi

          echo "Using simulator UDID: $UDID"
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Run iOS test suite
        working-directory: TriCoachAI
        run: |
          xcodebuild test \
            -project TriCoachAI.xcodeproj \
            -scheme TriCoachAI \
            -destination "id=$SIMULATOR_UDID" \
            -resultBundlePath TestResults

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: |
            TriCoachAI/TestResults.xcresult
            tricoach-backend/backend.log
